<!DOCTYPE html>
<html>
<head>
  <title>PSA Login</title>
</head>
<body>
  <h2>Login</h2>
  <input id="empID" placeholder="Employee ID"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="error" style="color:red"></p>

<script>
const USERS = [
  {empID:'9999999', name:'ADMIN', role:'ADMIN', pass:'admin1234', team:'ALL'},
  {empID:'2000810', name:'LAWAN', role:'DIR', pass:'2000810', team:'ALL'}
];

function login(){
  const id = document.getElementById('empID').value;
  const pw = document.getElementById('password').value;

  const stored = JSON.parse(localStorage.getItem('users')||'[]');
  const all = USERS.concat(stored);

  const user = all.find(u => u.empID===id && u.pass===pw);

  if(!user){
    document.getElementById('error').innerText='Login failed';
    return;
  }

  localStorage.setItem('currentUser', JSON.stringify(user));
  window.location.href = 'app.html';
}
</script>
</body>
</html>
